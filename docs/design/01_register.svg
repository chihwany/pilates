<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" rx="40" fill="#F8FAFC"/>
  <rect width="375" height="44" rx="40" fill="#F8FAFC"/>
  <text x="32" y="30" font-size="14" font-weight="600" fill="#1E293B">9:41</text>

  <!-- Back Button -->
  <text x="24" y="76" font-size="14" fill="#64748B">← 뒤로</text>

  <!-- Title -->
  <text x="24" y="116" font-size="24" font-weight="800" fill="#1E293B">회원가입</text>
  <text x="24" y="136" font-size="14" fill="#94A3B8">기본 정보를 입력해주세요</text>

  <!-- Name Input -->
  <text x="32" y="178" font-size="13" font-weight="600" fill="#475569">이름</text>
  <rect x="24" y="186" width="327" height="44" rx="12" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="214" font-size="14" fill="#CBD5E1">홍길동</text>

  <!-- Email Input -->
  <text x="32" y="256" font-size="13" font-weight="600" fill="#475569">이메일</text>
  <rect x="24" y="264" width="327" height="44" rx="12" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="292" font-size="14" fill="#CBD5E1">email@example.com</text>

  <!-- Password -->
  <text x="32" y="334" font-size="13" font-weight="600" fill="#475569">비밀번호</text>
  <rect x="24" y="342" width="327" height="44" rx="12" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="370" font-size="14" fill="#CBD5E1">8자 이상</text>

  <!-- Password Confirm -->
  <text x="32" y="412" font-size="13" font-weight="600" fill="#475569">비밀번호 확인</text>
  <rect x="24" y="420" width="327" height="44" rx="12" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="448" font-size="14" fill="#CBD5E1">비밀번호 재입력</text>

  <!-- Role Selector -->
  <text x="32" y="496" font-size="13" font-weight="600" fill="#475569">역할 선택</text>

  <!-- Instructor Button -->
  <rect x="24" y="506" width="156" height="48" rx="12" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="102" y="536" font-size="15" font-weight="600" text-anchor="middle" fill="#64748B">🧑‍🏫 강사</text>

  <!-- Member Button (Active) -->
  <rect x="195" y="506" width="156" height="48" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="273" y="536" font-size="15" font-weight="600" text-anchor="middle" fill="#6366F1">🏃 회원</text>

  <!-- Info Box -->
  <rect x="24" y="574" width="327" height="48" rx="10" fill="#F1F5F9"/>
  <text x="36" y="596" font-size="12" fill="#94A3B8">※ 얼굴 사진 등록 불필요. 로그인 후 카메라로</text>
  <text x="36" y="612" font-size="12" fill="#94A3B8">   컨디션만 체크합니다.</text>

  <!-- Register Button -->
  <rect x="24" y="646" width="327" height="52" rx="14" fill="#6366F1"/>
  <text x="187" y="678" font-size="16" font-weight="700" text-anchor="middle" fill="#FFF">가입하기</text>

  <!-- Login Link -->
  <text x="187" y="730" font-size="14" text-anchor="middle" fill="#64748B">이미 계정이 있으신가요?</text>
  <text x="187" y="750" font-size="14" font-weight="600" text-anchor="middle" fill="#6366F1">로그인</text>

  <rect width="375" height="812" rx="40" fill="none" stroke="#1E293B" stroke-width="2"/>
</svg>
