  <text x="187" y="503" font-size="12" font-weight="500" text-anchor="middle" fill="#92400E">⏰ 오후 1시까지 미체크 시 프로필 기반 자동 생성</text>

  <!-- Tab Bar -->
  <rect x="0" y="740" width="375" height="72" rx="0" fill="#FFFFFF"/>
  <line x1="0" y1="740" x2="375" y2="740" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="14" y="750" width="75" height="3" rx="2" fill="#6366F1"/>
  <text x="51" y="774" font-size="11" font-weight="700" text-anchor="middle" fill="#6366F1">오늘</text>
  <text x="145" y="774" font-size="11" font-weight="500" text-anchor="middle" fill="#94A3B8">컨디션</text>
  <text x="234" y="774" font-size="11" font-weight="500" text-anchor="middle" fill="#94A3B8">기록</text>
  <text x="323" y="774" font-size="11" font-weight="500" text-anchor="middle" fill="#94A3B8">프로필</text>
  <text x="51" y="796" font-size="18" text-anchor="middle">📅</text>
  <text x="145" y="796" font-size="18" text-anchor="middle">📷</text>
  <text x="234" y="796" font-size="18" text-anchor="middle">📊</text>
  <text x="323" y="796" font-size="18" text-anchor="middle">👤</text>

  <rect x="0" y="0" width="375" height="812" rx="40" fill="none" stroke="#1E293B" stroke-width="2"/>

