  <!-- Labels -->
  <text x="187" y="-10" font-size="13" font-weight="600" text-anchor="middle" fill="#64748B">시퀀스 미배정</text>
  <text x="592" y="-10" font-size="13" font-weight="600" text-anchor="middle" fill="#64748B">시퀀스 배정됨</text>
