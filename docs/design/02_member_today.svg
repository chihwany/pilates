    <text x="68" y="440" font-size="11" fill="#10B981">코어 안정화 + 척추 분절</text>
    <text x="327" y="412" font-size="13" fill="#94A3B8" text-anchor="end">▸</text>

    <!-- Exercise 4 -->
    <rect x="24" y="464" width="327" height="76" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="44" y="484" font-size="11" font-weight="700" fill="#6366F1">4</text>
    <circle cx="44" cy="480" r="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    <text x="68" y="488" font-size="15" font-weight="700" fill="#1E293B">리포머 풋워크</text>
    <text x="68" y="508" font-size="12" fill="#94A3B8">하체 · 리포머 · 5분 · 3세트</text>
    <text x="68" y="528" font-size="11" fill="#10B981">하지 근력 강화 + 정렬</text>
    <text x="327" y="500" font-size="13" fill="#94A3B8" text-anchor="end">▸</text>

    <!-- Exercise 5 -->
    <rect x="24" y="552" width="327" height="76" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="44" y="572" font-size="11" font-weight="700" fill="#6366F1">5</text>
    <circle cx="44" cy="568" r="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    <text x="68" y="576" font-size="15" font-weight="700" fill="#1E293B">스파인 스트레치</text>
    <text x="68" y="596" font-size="12" fill="#94A3B8">유연성 · 매트 · 3분</text>
    <text x="68" y="616" font-size="11" fill="#10B981">유연성 요청 반영</text>
    <text x="327" y="588" font-size="13" fill="#94A3B8" text-anchor="end">▸</text>

    <!-- More indicator -->
    <text x="187" y="660" font-size="12" font-weight="500" text-anchor="middle" fill="#94A3B8">+ 4개 운동 더보기</text>

    <!-- Tab Bar -->
    <rect x="0" y="740" width="375" height="72" fill="#FFFFFF"/>
    <line x1="0" y1="740" x2="375" y2="740" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="14" y="750" width="75" height="3" rx="2" fill="#6366F1"/>
    <text x="51" y="774" font-size="11" font-weight="700" text-anchor="middle" fill="#6366F1">오늘</text>
    <text x="145" y="774" font-size="11" text-anchor="middle" fill="#94A3B8">컨디션</text>
    <text x="234" y="774" font-size="11" text-anchor="middle" fill="#94A3B8">기록</text>
    <text x="323" y="774" font-size="11" text-anchor="middle" fill="#94A3B8">프로필</text>
    <text x="51" y="796" font-size="18" text-anchor="middle">📅</text>
    <text x="145" y="796" font-size="18" text-anchor="middle">📷</text>
    <text x="234" y="796" font-size="18" text-anchor="middle">📊</text>
    <text x="323" y="796" font-size="18" text-anchor="middle">👤</text>

    <rect x="0" y="0" width="375" height="812" rx="40" fill="none" stroke="#1E293B" stroke-width="2"/>
