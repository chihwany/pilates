<svg xmlns="http://www.w3.org/2000/svg" width="780" height="812" viewBox="0 0 780 812">
  <defs>
    <style>text { font-family: 'Noto Sans KR', -apple-system, sans-serif; }</style>
  </defs>

  <!-- ===== 화면 1: 시퀀스 미배정 ===== -->
  <rect x="0" y="0" width="375" height="812" rx="40" fill="#F8FAFC"/>
  <text x="187" y="30" font-size="14" font-weight="600" text-anchor="middle" fill="#1E293B">9:41</text>

  <!-- Header -->
  <text x="24" y="80" font-size="22" font-weight="800" fill="#1E293B">오늘의 운동</text>
  <text x="24" y="100" font-size="13" fill="#94A3B8">2026.03.20 (목)</text>

  <!-- Empty State -->
  <text x="187" y="280" font-size="56" text-anchor="middle">📋</text>
  <text x="187" y="330" font-size="17" font-weight="700" text-anchor="middle" fill="#1E293B">아직 시퀀스가 없습니다</text>
  <text x="187" y="356" font-size="14" text-anchor="middle" fill="#94A3B8">컨디션 체크를 진행하면</text>
  <text x="187" y="376" font-size="14" text-anchor="middle" fill="#94A3B8">맞춤 시퀀스가 자동 생성됩니다</text>

  <!-- CTA Button -->
  <rect x="48" y="410" width="279" height="52" rx="14" fill="#6366F1"/>
  <text x="187" y="442" font-size="16" font-weight="700" text-anchor="middle" fill="#FFF">컨디션 체크하기 →</text>

  <!-- Deadline Notice -->
