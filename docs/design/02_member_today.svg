    <rect x="24" y="200" width="327" height="76" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="44" y="220" font-size="11" font-weight="700" fill="#6366F1">1</text>
    <circle cx="44" cy="216" r="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
