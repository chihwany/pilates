    <text x="327" y="236" font-size="13" fill="#94A3B8" text-anchor="end">▸</text>

    <!-- Exercise 2 -->
    <rect x="24" y="288" width="327" height="76" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="44" y="308" font-size="11" font-weight="700" fill="#6366F1">2</text>
    <circle cx="44" cy="304" r="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
