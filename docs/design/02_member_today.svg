    <text x="68" y="332" font-size="12" fill="#94A3B8">스트레칭 · 매트 · 3분</text>
    <text x="68" y="352" font-size="11" fill="#F59E0B">턱 긴장 감지 → 이완 운동 추가</text>
    <text x="327" y="324" font-size="13" fill="#94A3B8" text-anchor="end">▸</text>

    <!-- Exercise 3 -->
    <rect x="24" y="376" width="327" height="76" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="44" y="396" font-size="11" font-weight="700" fill="#6366F1">3</text>
    <circle cx="44" cy="392" r="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
