    <text x="187" y="620" font-size="13" font-weight="600" text-anchor="middle" fill="#1E293B">시퀀스 생성 미리보기</text>
    <text x="187" y="644" font-size="12" text-anchor="middle" fill="#94A3B8">컨디션 + 프로필 + 코어/유연성 조합으로</text>
