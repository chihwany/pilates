    <text x="102" y="378" font-size="20" text-anchor="middle">🌬️</text>
    <text x="102" y="400" font-size="13" font-weight="500" text-anchor="middle" fill="#64748B">호흡/릴랙스</text>

    <rect x="195" y="348" width="156" height="64" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="273" y="378" font-size="20" text-anchor="middle">🧍</text>
    <text x="273" y="400" font-size="13" font-weight="500" text-anchor="middle" fill="#64748B">자세 교정</text>

