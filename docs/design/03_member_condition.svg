    <text x="102" y="324" font-size="13" font-weight="500" text-anchor="middle" fill="#64748B">밸런스</text>

    <rect x="195" y="272" width="156" height="64" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
