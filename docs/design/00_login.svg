<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&amp;display=swap');
      text { font-family: 'Noto Sans KR', -apple-system, sans-serif; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" rx="40" fill="#F8FAFC"/>

  <!-- Status Bar -->
  <rect width="375" height="44" rx="40" fill="#F8FAFC"/>
  <text x="32" y="30" font-size="14" font-weight="600" fill="#1E293B">9:41</text>
  <text x="320" y="30" font-size="12" fill="#1E293B">📶 🔋</text>

  <!-- Logo Area -->
  <text x="187" y="200" font-size="48" text-anchor="middle" fill="#1E293B">🧘‍♀️</text>
  <text x="187" y="248" font-size="32" font-weight="800" text-anchor="middle" fill="#6366F1">Pilates AI</text>
  <text x="187" y="272" font-size="14" font-weight="400" text-anchor="middle" fill="#94A3B8">AI 맞춤 운동 시퀀스</text>

  <!-- Email Input -->
  <text x="32" y="340" font-size="13" font-weight="600" fill="#475569">이메일</text>
  <rect x="24" y="350" width="327" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="380" font-size="15" fill="#CBD5E1">email@example.com</text>

  <!-- Password Input -->
  <text x="32" y="430" font-size="13" font-weight="600" fill="#475569">비밀번호</text>
  <rect x="24" y="440" width="327" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="470" font-size="15" fill="#CBD5E1">비밀번호 입력</text>

  <!-- Login Button -->
  <rect x="24" y="520" width="327" height="52" rx="14" fill="#6366F1"/>
  <text x="187" y="552" font-size="16" font-weight="700" text-anchor="middle" fill="#FFFFFF">로그인</text>

  <!-- Register Link -->
  <text x="187" y="610" font-size="14" text-anchor="middle" fill="#64748B">계정이 없으신가요?</text>
  <text x="187" y="632" font-size="14" font-weight="600" text-anchor="middle" fill="#6366F1">회원가입</text>

  <!-- Phone Frame -->
  <rect width="375" height="812" rx="40" fill="none" stroke="#1E293B" stroke-width="2"/>
</svg>
